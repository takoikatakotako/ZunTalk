name: iOS Lint

on:
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-lint.yml'
  push:
    branches:
      - main
    paths:
      - 'ios/**'
      - '.github/workflows/ios-lint.yml'

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        working-directory: ios
        run: swiftlint lint --strict --reporter github-actions-logging
