# SwiftLint Configuration for ZunTalk

excluded:
  - Voicevox
  - ZunTalkUITests

disabled_rules:
  - trailing_comma
  - todo
  - multiple_closures_with_trailing_closure
  - type_name

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_filter_count
  - contains_over_first_not_nil
  - discouraged_optional_boolean
  - empty_string
  - fatal_error_message
  - first_where
  - last_where
  - modifier_order
  - overridden_super_call
  - private_action
  - private_outlet
  - sorted_first_last
  - yoda_condition

line_length:
  warning: 150
  error: 200

type_body_length:
  warning: 350
  error: 500

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 50
  error: 100

identifier_name:
  min_length:
    warning: 1
  excluded:
    - id
    - i
    - x
    - y
  excluded_names:
    - output_text

large_tuple:
  warning: 4

nesting:
  type_level: 3
  function_level: 3
